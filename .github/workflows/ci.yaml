name: CI

on:
  push:
    branches: [main]
    paths:
      - "**.lock"
      - "**.rs"
      - "**.nix"
      - "Cargo.toml"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "**.lock"
      - "**.rs"
      - "**.nix"
      - "Cargo.toml"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  security-events: none # no SARIF uploads at workflow level; only upload-sarif job needs write

jobs:
  build:
    name: Build

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31

      - name: Setup cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Run build
        run: |
          nix build --print-build-logs .#

  format-and-lint:
    name: Format and lint

    runs-on: ubuntu-latest
    outputs:
      sarif_uploaded: ${{ steps.set-artifact-output.outputs.sarif_uploaded }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31

      - name: Setup cache
        uses: DeterminateSystems/magic-nix-cache-action@908b263ff629f4cc17666315b7fd3ec127c6244d # v14

      - name: Run clippy check
        id: save-clippy
        continue-on-error: true
        run: |
          nix build --print-build-logs .#checks.x86_64-linux.clippy
          [ -L result ] || exit 1

      - name: Upload SARIF artifact
        if: steps.save-clippy.outcome == 'success'
        id: clippy-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: sarif-results
          path: result
          retention-days: 1

      - name: Confirm SARIF artifact upload
        id: set-artifact-output
        if: steps.clippy-artifact.outcome == 'success'
        run: |
         echo "sarif_uploaded=true" >> "$GITHUB_OUTPUT"

      - name: Run flake checks
        run: |
          nix flake check --print-build-logs --show-trace

  upload-sarif:
    name: Upload SARIF results

    runs-on: ubuntu-latest
    needs: format-and-lint
    if: needs.format-and-lint.outputs.sarif_uploaded == 'true'

    permissions:
      security-events: write # required to upload SARIF results to GitHub code scanning

    steps:
      - name: Download SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: sarif-results
          path: .

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          sarif_file: result

  release-gate:
    name: CI Release gate
    needs: [build, format-and-lint]

    if: ${{ always() }}

    runs-on: ubuntu-latest

    steps:
      - name: Exit with error
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
