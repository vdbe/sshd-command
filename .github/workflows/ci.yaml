name: CI

on:
  push:
    branches: [main]
    paths:
      - "**.lock"
      - "**.rs"
      - "**.nix"
      - "Cargo.toml"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "**.lock"
      - "**.rs"
      - "**.nix"
      - "Cargo.toml"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  security-events: none

jobs:
  build:
    name: Build

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31

      - name: Setup cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Run build
        run: |
          nix build --print-build-logs .#

  format-and-lint:
    name: Format and lint

    runs-on: ubuntu-latest
    outputs:
      sarif_uploaded: ${{ steps.set-artifact-output.outputs.sarif_uploaded }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31

      - name: Setup cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Run clippy check
        id: save-clippy
        continue-on-error: true
        run: |
          nix build --print-build-logs .#checks.x86_64-linux.clippy
          [ -L result ] || exit 1

      - name: Upload SARIF artifact
        if: steps.save-clippy.outcome == 'success'
        id: clippy-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4
        with:
          name: sarif-results
          path: result
          retention-days: 1

      - name: Confirm SARIF artifact upload
        id: set-artifact-output
        if: steps.clippy-artifact.outcome == 'success'
        run: |
         echo "sarif_uploaded=true" >> "$GITHUB_OUTPUT"

      - name: Run flake checks
        run: |
          nix flake check --print-build-logs --show-trace

  upload-sarif:
    name: Upload SARIF results

    runs-on: ubuntu-latest
    needs: format-and-lint
    if: needs.format-and-lint.outputs.sarif_uploaded == 'true'

    permissions:
      security-events: write
      # actions: read
      # contents: read

    steps:
      - name: Download SARIF artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v4
        with:
          name: sarif-results
          path: .

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3
        with:
          sarif_file: result

  release-gate:
    name: CI Release gate
    needs: [build, format-and-lint]

    if: ${{ always() }}

    runs-on: ubuntu-latest

    steps:
      - name: Exit with error
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
