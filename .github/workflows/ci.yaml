name: CI

on:
  push:
    branches: [main]
    paths:
      - "**.lock"
      - "**.rs"
      - "**.nix"
      - "Cargo.toml"
      - ".github/workflows/ci.yaml"
  pull_request:
    paths:
      - "**.lock"
      - "**.rs"
      - "**.nix"
      - "Cargo.toml"
      - ".github/workflows/ci.yaml"
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  security-events: none

jobs:
  build:
    name: Build

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          # - macos-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@fd24c48048070c1be9acd18c9d369a83f0fe94d7 # v31

      - name: Setup cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Run build
        run: |
          nix build --print-build-logs .#

  format-and-lint:
    name: Format and lint

    runs-on: ubuntu-latest
    outputs:
      sarif_uploaded: ${{ steps.set-artifact-output.outputs.sarif_uploaded }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v4
        with:
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@fd24c48048070c1be9acd18c9d369a83f0fe94d7 # v31

      - name: Setup cache
        uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Run clippy check
        id: save-clippy
        continue-on-error: true
        run: |
          nix build --print-build-logs .#checks.x86_64-linux.clippy
          [ -L result ] || exit 1

      - name: Upload SARIF artifact
        if: steps.save-clippy.outcome == 'success'
        id: clippy-artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sarif-results
          path: result
          retention-days: 1

      - name: Confirm SARIF artifact upload
        id: set-artifact-output
        if: steps.clippy-artifact.outcome == 'success'
        run: |
         echo "sarif_uploaded=true" >> "$GITHUB_OUTPUT"

      - name: Run flake checks
        run: |
          nix flake check --print-build-logs --show-trace

  upload-sarif:
    name: Upload SARIF results

    runs-on: ubuntu-latest
    needs: format-and-lint
    if: needs.format-and-lint.outputs.sarif_uploaded == 'true'

    permissions:
      security-events: write
      # actions: read
      # contents: read

    steps:
      - name: Download SARIF artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v4
        with:
          name: sarif-results
          path: .

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@16140ae1a102900babc80a33c44059580f687047 # v3
        with:
          sarif_file: result

  release-gate:
    name: CI Release gate
    needs: [build, format-and-lint]

    if: ${{ always() }}

    runs-on: ubuntu-latest

    steps:
      - name: Exit with error
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
